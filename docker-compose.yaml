services:
  # Service PHP avec Apache
  php:
    build:
      context: ./php
    container_name: symfony_php
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./apache/default.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      - database

  # Base de données MySQL
  database:
    image: mysql:8.0
    container_name: symfony_database
    environment:
      MYSQL_DATABASE: mabase
      MYSQL_USER: symfony
      MYSQL_PASSWORD: azerty
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - ./database/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # phpMyAdmin pour gérer MySQL
  phpmyadmin:
    image: phpmyadmin
    container_name: symfony_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_USER: symfony
      PMA_PASSWORD: azerty
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - database

  # Base de données MongoDB
  mongodb:
        image: mongo:latest
        ports:
            - 27017:27017
        volumes:
            - mongo_data:/data/db
        restart: always


  # dbgate pour gérer MongoDB
  dbgate:
        image: dbgate/dbgate
        restart: always
        ports:
            - 8082:3000
        volumes:
            - dbgate-data:/root/.dbgate
        environment:
            CONNECTIONS: con1

            LABEL_con1: MongoDB
            URL_con1: mongodb://mongodb
            ENGINE_con1: mongo@dbgate-plugin-mongo


# Service mail pour le développement
  mailer:
    image: axllent/mailpit
    container_name: symfony_mailer
    ports:
      - "8025:8025"  # Interface web
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
    mongo_data:
    dbgate-data: